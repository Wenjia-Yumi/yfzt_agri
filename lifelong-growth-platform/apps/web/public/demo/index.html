<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>终身成长平台 · 知识星图系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-bg: #161B22;
  --panel-bg: #161B22;
  --canvas-bg: #0D1117;
  --border: rgba(255,255,255,0.08);
  --text-primary: #E6EDF3;
  --text-secondary: #7D8590;
  --accent: #534AB7;
  --c-core: #534AB7;
  --c-trade: #1D9E75;
  --c-platform: #7F77DD;
  --c-marketing: #D85A30;
  --c-supply: #BA7517;
  --c-finance: #185FA5;
  --c-data: #3B6D11;
  --c-cross: #993556;
  --c-mastered: #1D9E75;
  --c-learning: #EF9F27;
  --c-locked: #4A4A52;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--canvas-bg);
  color: var(--text-primary);
}

#app {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   左侧边栏
═══════════════════════════════════════ */
#sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
}

/* Logo区 */
.logo-area {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.logo-icon svg { width: 32px; height: 32px; }
.logo-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.logo-sub {
  font-size: 11px;
  color: var(--text-secondary);
  padding-left: 42px;
  letter-spacing: 0.05em;
}

/* 用户卡片 */
.user-card {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.user-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7F77DD);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.user-info .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.user-info .meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.user-tags { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.tag {
  font-size: 10px; color: var(--text-secondary);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px;
}
.progress-summary { }
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-secondary); margin-bottom: 5px;
}
.progress-label span:last-child { color: var(--c-mastered); font-weight: 600; }
.progress-bar-wrap {
  height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-mastered), #34D399);
  border-radius: 3px;
  transition: width 1s ease;
}

/* 星域筛选器 */
.filter-section {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.filter-title {
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
}
.filter-btns { display: flex; flex-direction: column; gap: 3px; }
.filter-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 9px; border-radius: 6px;
  border: none; background: transparent;
  cursor: pointer; width: 100%; text-align: left;
  color: var(--text-secondary); font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: background 0.15s, color 0.15s;
}
.filter-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.filter-btn.active { background: rgba(83,74,183,0.18); color: var(--text-primary); }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* 图例 */
.legend-section {
  padding: 12px 18px;
  margin-top: auto;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.legend-title {
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
}
.legend-items { display: flex; flex-direction: column; gap: 6px; }
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-secondary);
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.legend-dot.pulse-demo {
  animation: legend-pulse 2s infinite;
}
@keyframes legend-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,159,39,0.6); }
  50% { box-shadow: 0 0 0 5px rgba(239,159,39,0); }
}

/* ═══════════════════════════════════════
   中央画布
═══════════════════════════════════════ */
#canvas-wrap {
  flex: 1;
  position: relative;
  background: var(--canvas-bg);
  overflow: hidden;
}

#star-svg {
  width: 100%; height: 100%;
  display: block;
}

/* 顶部工具栏 */
.canvas-toolbar {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; justify-content: space-between;
  width: calc(100% - 40px); max-width: 800px;
  background: rgba(22,27,34,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 14px;
  z-index: 5;
}
.breadcrumb {
  font-size: 12px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 5px;
}
.breadcrumb .sep { opacity: 0.4; }
.breadcrumb .current { color: var(--text-primary); font-weight: 500; }
.toolbar-actions { display: flex; gap: 6px; }
.tool-btn {
  width: 30px; height: 30px; border-radius: 6px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
  font-size: 13px;
}
.tool-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

/* Tooltip */
#tooltip {
  position: absolute;
  background: rgba(22,27,34,0.95);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-primary);
  pointer-events: none;
  z-index: 100;
  display: none;
  max-width: 200px;
  backdrop-filter: blur(8px);
}
#tooltip .tip-label { font-weight: 600; margin-bottom: 3px; }
#tooltip .tip-desc { color: var(--text-secondary); font-size: 11px; line-height: 1.4; }

/* AI浮动按钮 */
#ai-fab {
  position: absolute; bottom: 24px; right: 24px; z-index: 20;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  box-shadow: 0 4px 20px rgba(83,74,183,0.5);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s;
}
#ai-fab:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(83,74,183,0.7);
}

/* AI对话面板 */
#ai-panel {
  position: absolute; bottom: 0; left: 0; right: 0; height: 320px;
  background: rgba(13,17,23,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(83,74,183,0.3);
  z-index: 30;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease-out;
}
#ai-panel.open { transform: translateY(0); }

.ai-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ai-panel-title {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.ai-badge {
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  border-radius: 4px; padding: 2px 7px;
  font-size: 10px; color: white; font-weight: 700;
}
.ai-close {
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: none;
  color: var(--text-secondary); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.ai-close:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

.ai-messages {
  flex: 1; overflow-y: auto; padding: 12px 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.ai-messages::-webkit-scrollbar { width: 4px; }
.ai-messages::-webkit-scrollbar-track { background: transparent; }
.ai-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.msg {
  display: flex; gap: 8px; max-width: 90%;
}
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
}
.msg.ai .msg-avatar { background: linear-gradient(135deg, #534AB7, #7F77DD); color: white; }
.msg.user .msg-avatar { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
.msg-bubble {
  border-radius: 10px; padding: 8px 12px;
  font-size: 12px; line-height: 1.6; color: var(--text-primary);
}
.msg.ai .msg-bubble { background: rgba(83,74,183,0.15); border: 1px solid rgba(83,74,183,0.2); }
.msg.user .msg-bubble { background: rgba(255,255,255,0.06); border: 1px solid var(--border); }

.ai-input-row {
  display: flex; gap: 8px; padding: 10px 18px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.ai-input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--text-primary); font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.ai-input::placeholder { color: var(--text-secondary); }
.ai-input:focus { border-color: rgba(83,74,183,0.5); }
.ai-send {
  width: 34px; height: 34px; border-radius: 7px;
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  border: none; cursor: pointer; color: white; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
.ai-send:hover { opacity: 0.85; }

/* ═══════════════════════════════════════
   右侧详情面板
═══════════════════════════════════════ */
#detail-panel {
  width: 320px; min-width: 320px;
  height: 100vh;
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
}

.panel-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-header-title {
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.08em; text-transform: uppercase;
}

.panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* 默认面板：统计 */
.stat-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 16px 0 10px;
}
.ring-label {
  text-align: center;
  position: absolute;
}
.ring-pct { font-size: 22px; font-weight: 700; color: var(--text-primary); display: block; }
.ring-sub { font-size: 10px; color: var(--text-secondary); }

.domain-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.domain-row { }
.domain-row-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.domain-name { font-size: 11px; color: var(--text-secondary); }
.domain-pct { font-size: 11px; color: var(--text-primary); font-weight: 600; }
.domain-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.domain-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

.section-title {
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 10px; margin-top: 16px;
}

.recent-list, .recommend-list { display: flex; flex-direction: column; gap: 6px; }
.recent-item, .recommend-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: 7px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  cursor: pointer; transition: background 0.2s;
}
.recent-item:hover, .recommend-item:hover { background: rgba(255,255,255,0.07); }
.ri-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ri-text { flex: 1; }
.ri-label { font-size: 12px; color: var(--text-primary); }
.ri-meta { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }
.ri-arrow { color: var(--text-secondary); font-size: 11px; }

/* 节点详情面板 */
.node-detail-name {
  font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3;
}
.node-detail-tags { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.nd-tag {
  font-size: 10px; border-radius: 5px; padding: 3px 8px; font-weight: 500;
}
.nd-tag.domain-tag { background: rgba(83,74,183,0.2); color: #AFA9EC; border: 1px solid rgba(83,74,183,0.3); }
.nd-tag.status-mastered { background: rgba(29,158,117,0.2); color: #4ADE80; border: 1px solid rgba(29,158,117,0.3); }
.nd-tag.status-learning { background: rgba(239,159,39,0.2); color: #FCD34D; border: 1px solid rgba(239,159,39,0.3); }
.nd-tag.status-locked { background: rgba(74,74,82,0.3); color: #9CA3AF; border: 1px solid rgba(74,74,82,0.5); }

.nd-divider { height: 1px; background: var(--border); margin: 12px 0; }

.nd-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; }

.nd-section-title {
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px;
}
.nd-prereq-list, .nd-related-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.nd-chip {
  font-size: 11px; padding: 3px 9px; border-radius: 5px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: background 0.2s, color 0.2s;
}
.nd-chip:hover { background: rgba(83,74,183,0.2); color: var(--text-primary); border-color: rgba(83,74,183,0.3); }

/* 微证书区块 */
.cert-block {
  border-radius: 10px; padding: 14px;
  border: 1px solid var(--border); margin-bottom: 14px;
}
.cert-block.mastered { background: rgba(29,158,117,0.08); border-color: rgba(29,158,117,0.25); }
.cert-block.learning { background: rgba(239,159,39,0.08); border-color: rgba(239,159,39,0.25); }
.cert-block.locked { background: rgba(74,74,82,0.1); border-color: rgba(74,74,82,0.3); }

.cert-badge { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cert-icon { font-size: 20px; }
.cert-info .cert-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.cert-info .cert-date { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

.cert-progress-wrap { margin-bottom: 10px; }
.cert-progress-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-secondary); margin-bottom: 5px;
}
.cert-progress-bar {
  height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
}
.cert-progress-fill {
  height: 100%; background: linear-gradient(90deg, #EF9F27, #FCD34D); border-radius: 3px;
}

.btn {
  width: 100%; padding: 9px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; transition: filter 0.2s;
}
.btn:hover { filter: brightness(1.1); }
.btn-start { background: var(--c-mastered); color: white; }
.btn-continue { background: #EF9F27; color: white; }
.btn-locked { background: rgba(255,255,255,0.06); color: var(--text-secondary); cursor: not-allowed; }

.jobs-section { }
.jobs-list { display: flex; flex-wrap: wrap; gap: 6px; }
.job-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  background: rgba(83,74,183,0.15); border: 1px solid rgba(83,74,183,0.25);
  color: #AFA9EC;
}

/* ═══════════════════════════════════════
   D3 力导向图样式
═══════════════════════════════════════ */
.node-group { cursor: pointer; }
.node-group:hover .node-circle { filter: brightness(1.25); }
.node-glow { pointer-events: none; }
.node-pulse { pointer-events: none; }

@keyframes pulse-ring {
  0%   { r: var(--pr-start, 20); opacity: 0.55; }
  100% { r: var(--pr-end, 36); opacity: 0; }
}

.link-line { pointer-events: none; }

/* ═══════════════════════════════════════
   星域过滤 & 选中状态
═══════════════════════════════════════ */
.node-group.dimmed { opacity: 0.1 !important; transition: opacity 0.3s; }
.node-group.highlighted { opacity: 1 !important; }
.link-line.dimmed { opacity: 0.04 !important; transition: opacity 0.3s; }
.link-line.highlighted { stroke-opacity: 0.7 !important; stroke-width: 2px !important; transition: all 0.3s; }

/* ═══════════════════════════════════════
   AI对话增强样式
═══════════════════════════════════════ */

/* 打字机光标 */
.tw-cursor {
  display: inline;
  color: rgba(255,255,255,0.7);
  animation: tw-blink 0.7s step-end infinite;
}
@keyframes tw-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* AI思考三点跳动动画 */
.thinking-dots {
  display: flex;
  gap: 5px;
  align-items: center;
}
.thinking-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.45);
  animation: td-bounce 1.4s infinite ease-in-out;
}
.thinking-dots span:nth-child(1) { animation-delay: 0s; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes td-bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1.1); opacity: 1; }
}

/* 重置msg最大宽度，由气泡自身控制 */
.msg { max-width: 100%; }

/* 用户气泡 */
.msg.user .msg-user-bubble {
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  color: white;
  border-radius: 16px 16px 4px 16px;
  max-width: 70%;
  padding: 10px 14px;
  border: none;
  font-size: 12px;
  line-height: 1.6;
  word-break: break-word;
}

/* AI气泡 */
.msg.ai .msg-ai-bubble {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #E6EDF3;
  border-radius: 16px 16px 16px 4px;
  max-width: 85%;
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.7;
  word-break: break-word;
}

/* AI头像 */
.ai-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
  flex-shrink: 0;
}

/* 星图高亮圆环 */
.highlight-ring { pointer-events: none; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══ 左侧边栏 ═══ -->
  <aside id="sidebar">
    <!-- Logo -->
    <div class="logo-area">

function getNodeColor(node) {
  if (node.domain === 'core') return DOMAIN_COLORS.core;
  if (node.status === 'mastered') return STATUS_COLORS.mastered;
  if (node.status === 'learning') return STATUS_COLORS.learning;

}

function getEdgeColor(source, target) {
  const dom = source.domain !== 'core' ? source.domain : target.domain;

}

// ════════════════════════════════════════════════════
// D3 力导向图初始化
// ════════════════════════════════════════════════════
function initStarMap() {
  const container = document.getElementById('canvas-wrap');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const nodes = NODES_RAW.map(d => ({ ...d }));
  const nodeById = {};
  nodes.forEach(n => { nodeById[n.id] = n; });

  const links = EDGES_RAW.map(([s, t]) => ({
    source: s, target: t,
    sourceNode: nodeById[s], targetNode: nodeById[t]
  }));

  const svg = d3.select('#star-svg')
    .attr('width', W)
    .attr('height', H);

  svgRoot = svg;

  // 星空背景粒子
  const starsData = d3.range(180).map(() => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.3,
    o: Math.random() * 0.5 + 0.1
  }));
  svg.append('g').attr('class','bg-stars')
    .selectAll('circle').data(starsData).join('circle')
    .attr('cx', d=>d.x).attr('cy', d=>d.y)
    .attr('r', d=>d.r).attr('fill','white').attr('opacity', d=>d.o);

  // 缩放支持
  const zoomG = svg.append('g').attr('class','zoom-container');
  const zoom = d3.zoom()
    .scaleExtent([0.3, 3])
    .on('zoom', e => { zoomG.attr('transform', e.transform); });
  svg.call(zoom);

  // 边
  const linkG = zoomG.append('g').attr('class','links-group');
  const linkSel = linkG.selectAll('line.link-line')
    .data(links).join('line')
    .attr('class','link-line')
    .attr('stroke','rgba(255,255,255,0.12)')
    .attr('stroke-width', 1);

  // 节点组
  const nodeG = zoomG.append('g').attr('class','nodes-group');
  const nodeSel = nodeG.selectAll('g.node-group')
    .data(nodes).join('g')
    .attr('class','node-group')
    .attr('data-id', d => d.id)
    .attr('data-domain', d => d.domain)
    .style('cursor','pointer');

  // 外光晕（mastered & core）
  nodeSel.filter(d => d.status === 'mastered' || d.domain === 'core')
    .append('circle')
    .attr('class','node-glow')
    .attr('r', d => d.r + 10)
    .attr('fill', d => getNodeColor(d))
    .attr('opacity', 0.08);

  // 脉冲动画（learning）
  nodeSel.filter(d => d.status === 'learning' && d.domain !== 'core')
    .append('circle')
    .attr('class','node-pulse')
    .attr('r', d => d.r)
    .attr('fill', 'none')
    .attr('stroke', '#EF9F27')
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.5)
    .each(function(d) {
      const el = this;
      let startR = d.r;
      let endR = d.r + 16;
      let start = null;
      const dur = 2000;
      function animPulse(ts) {
        if (!start) start = ts;
        const progress = ((ts - start) % dur) / dur;
        const r = startR + (endR - startR) * progress;
        const o = 0.55 * (1 - progress);
        d3.select(el).attr('r', r).attr('opacity', o);
        requestAnimationFrame(animPulse);
      }
      requestAnimationFrame(animPulse);
    });

  // 主圆体
  nodeSel.append('circle')
    .attr('class','node-circle')
    .attr('r', d => d.r)
    .attr('fill', d => getNodeColor(d))
    .attr('stroke', d => d.domain === 'core' ? '#AFA9EC' : lightenColor(getNodeColor(d), 0.3))
    .attr('stroke-width', d => d.domain === 'core' ? 2.5 : 1.5)
    .style('transition','filter 0.2s, transform 0.2s');

  // 标签
  nodeSel.each(function(d) {
    const g = d3.select(this);
    const maxW = d.r * 1.8;
    const fontSize = Math.min(11, d.r * 0.55);
    const words = d.label;

    if (words.length <= 4 || d.r >= 20) {
      // 尝试换行
      const line1 = words.length > 4 ? words.slice(0, Math.ceil(words.length/2)) : words;
      const line2 = words.length > 4 ? words.slice(Math.ceil(words.length/2)) : null;
      if (line2) {
        g.append('text').attr('text-anchor','middle').attr('dy', '-0.3em')
          .attr('font-size', fontSize+'px').attr('fill','white').attr('font-weight','500')
          .attr('font-family',"'Noto Sans SC', sans-serif").attr('pointer-events','none')
          .text(line1);
        g.append('text').attr('text-anchor','middle').attr('dy', fontSize*1.2 - fontSize*0.3 + 'px')
          .attr('font-size', fontSize+'px').attr('fill','white').attr('font-weight','500')
          .attr('font-family',"'Noto Sans SC', sans-serif").attr('pointer-events','none')
          .text(line2);
      } else {
        g.append('text').attr('text-anchor','middle').attr('dy','0.35em')
          .attr('font-size', fontSize+'px').attr('fill','white').attr('font-weight','500')
          .attr('font-family',"'Noto Sans SC', sans-serif").attr('pointer-events','none')
          .text(line1);
      }
    } else {
      g.append('text').attr('text-anchor','middle').attr('dy','0.35em')
        .attr('font-size', Math.min(10, fontSize)+'px').attr('fill','white').attr('font-weight','500')
        .attr('font-family',"'Noto Sans SC', sans-serif").attr('pointer-events','none')
        .text(words);
    }

    if (d.sub) {
      g.append('text').attr('text-anchor','middle').attr('dy', d.r * 0.55 + 14 + 'px')
        .attr('font-size','9px').attr('fill','rgba(255,255,255,0.6)')
        .attr('font-family',"'Noto Sans SC', sans-serif").attr('pointer-events','none')
        .text(d.sub);
    }
  });

  // 节点交互
  const tooltip = document.getElementById('tooltip');
  nodeSel
    .on('mouseover', function(event, d) {
      d3.select(this).select('.node-circle').attr('filter','brightness(1.25)');
      tooltip.style.display = 'block';
      document.getElementById('tip-label').textContent = d.label;
      document.getElementById('tip-desc').textContent = d.desc ? d.desc.slice(0,60)+'...' : '';
    })
    .on('mousemove', function(event) {
      const rect = document.getElementById('canvas-wrap').getBoundingClientRect();
      let x = event.clientX - rect.left + 14;
      let y = event.clientY - rect.top - 10;
      if (x + 210 > rect.width) x = event.clientX - rect.left - 220;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    })
    .on('mouseout', function(event, d) {
      d3.select(this).select('.node-circle').attr('filter', null);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      event.stopPropagation();
      if (selectedNode && selectedNode.id === d.id) {
        clearSelection();
      } else {
        selectNode(d);
      }
    });

  // 点击空白取消选中
  svg.on('click', () => clearSelection());

  // 力导向
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => (d.source.r + d.target.r) * 3.5))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('collide', d3.forceCollide().radius(d => d.r + 20))
    .force('center', d3.forceCenter(W/2, H/2))
    .alphaDecay(0.02)
    .on('tick', () => {
      linkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // 拖拽
  nodeSel.call(d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    })
  );

  // 重置按钮
  document.getElementById('btn-reset').addEventListener('click', () => {
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  });

  // 全屏
  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });

  // 星域筛选
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.domain;
      applyFilter(activeFilter);
    });
  });

  function applyFilter(domain) {
    if (domain === 'all') {
      nodeSel.classed('dimmed', false).classed('highlighted', false);
      linkSel.classed('dimmed', false).classed('highlighted', false);
    } else {
      nodeSel.classed('dimmed', d => d.domain !== domain)
              .classed('highlighted', d => d.domain === domain);
      linkSel.classed('dimmed', d => d.source.domain !== domain && d.target.domain !== domain)
              .classed('highlighted', d => d.source.domain === domain || d.target.domain === domain);
    }
  }

  function selectNode(d) {
    selectedNode = d;
    clearSelection(false);

    // 找出关联节点
    const connectedIds = new Set([d.id]);
    links.forEach(l => {
      if (l.source.id === d.id) connectedIds.add(l.target.id);
      if (l.target.id === d.id) connectedIds.add(l.source.id);
    });

    nodeSel.classed('dimmed', n => !connectedIds.has(n.id))
            .classed('highlighted', n => connectedIds.has(n.id));

    linkSel.each(function(l) {
      const isConnected = l.source.id === d.id || l.target.id === d.id;
      d3.select(this)
        .classed('dimmed', !isConnected)
        .classed('highlighted', isConnected);
      if (isConnected) {
        const col = getEdgeColor(l.source, l.target);
        d3.select(this).attr('stroke', col);
      }
    });

    renderNodeDetail(d);
  }

  function clearSelection(renderDefault = true) {
    selectedNode = null;
    nodeSel.classed('dimmed', false).classed('highlighted', false);
    linkSel.classed('dimmed', false).classed('highlighted', false)
            .attr('stroke','rgba(255,255,255,0.12)');
    if (renderDefault) {
      applyFilter(activeFilter);
      renderDefaultPanel();
    }
  }
}

function lightenColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + Math.round(255 * amount));
  const g = Math.min(255, ((num >> 8) & 0xFF) + Math.round(255 * amount));
  const b = Math.min(255, (num & 0xFF) + Math.round(255 * amount));
  return `rgb(${r},${g},${b})`;
}

// 模糊匹配算法：从知识库中找到最佳匹配项
function findBestMatch(userInput, kb) {
  if (!kb || kb.length === 0) return null;

  // 预处理：转小写，去除标点与空白
  const cleaned = userInput.toLowerCase()
    .replace(/[，。！？、,.!?；;：:"'"'\s【】《》\[\]()（）]/g, '');
  const inputChars = new Set(cleaned.split(''));

  let bestScore = 0;
  let bestRecord = null;
  let defaultRecord = null;

  for (const record of kb) {
    if (record.id === 'default') {
      defaultRecord = record;
      continue;
    }

    let score = 0;

    // 关键词命中评分
    for (const kw of (record.keywords || [])) {
      const kwClean = kw.toLowerCase();
      if (cleaned.includes(kwClean)) {
        score += 10; // 完全包含该关键词
      } else if (kwClean.length >= 2) {
        // 关键词任意连续2字符出现在输入中
        for (let i = 0; i < kwClean.length - 1; i++) {
          if (cleaned.includes(kwClean[i] + kwClean[i + 1])) {
            score += 3;
            break;
          }
        }
      } else if (cleaned.includes(kwClean)) {
        score += 3; // 单字符关键词
      }
    }

    // 问句相似度评分（公共字符比例）
    for (const pattern of (record.patterns || [])) {
      const patClean = pattern.toLowerCase()
        .replace(/[，。！？、,.!?；;：:"'"'\s【】《》\[\]()（）]/g, '');
      const patChars = new Set(patClean.split(''));
      let commonCount = 0;
      for (const c of inputChars) {
        if (patChars.has(c)) commonCount++;
      }
      const similarity = commonCount / Math.max(inputChars.size, patChars.size, 1);
      if (similarity > 0.6) {
        score += 25; // 高相似度额外加分
      } else if (similarity > 0.4) {
        score += 15;
      }
    }

    // 意图分类加权
    const hasQuestion = /[?？]/.test(userInput);
    if (hasQuestion && ['path', 'prereq', 'detail'].includes(record.intent)) {
      score += 5;
    }
    if (userInput.length > 15 && record.intent === 'detail') {
      score += 3;
    }

    if (score > bestScore) {
      bestScore = score;
      bestRecord = record;
    }
  }

  // 根据得分决定置信度
  if (bestScore >= 8) {
    return { record: bestRecord, confidence: 'high' };
  } else if (bestScore >= 3) {
    return { record: bestRecord, confidence: 'medium' };
  } else {
    return { record: defaultRecord, confidence: 'low' };
  }
}

// 打字机效果渲染，支持\n→<br>和emoji
function typewriterRender(text, container, speed, onDone) {
  speed = (speed !== undefined) ? speed : 18;
  const chars = Array.from(text); // Array.from正确处理emoji等多字节字符
  let i = 0;

  container.innerHTML = '';
  // 插入闪烁光标元素
  const cursorEl = document.createElement('span');
  cursorEl.className = 'tw-cursor';
  cursorEl.textContent = '|';
  container.appendChild(cursorEl);

  const msgs = document.getElementById('ai-messages');

  function next() {
    if (i >= chars.length) {
      cursorEl.remove(); // 渲染完成后移除光标
      if (onDone) onDone();
      return;
    }
    const ch = chars[i];
    if (ch === '\n') {
      cursorEl.insertAdjacentHTML('beforebegin', '<br>');
    } else {
      // 用文本节点插入，天然避免XSS
      container.insertBefore(document.createTextNode(ch), cursorEl);
    }
    i++;
    if (i % 10 === 0) msgs.scrollTop = msgs.scrollHeight;
    setTimeout(next, speed);
  }
  next();
}

// 在D3星图上高亮指定节点，3秒后恢复
function highlightNodesOnMap(nodeIds) {
  if (!nodeIds || nodeIds.length === 0) return;

  nodeIds.forEach(id => {
    const nodeGroup = d3.select(`g.node-group[data-id="${id}"]`);
    if (nodeGroup.empty()) return;

    const circle = nodeGroup.select('.node-circle');
    if (circle.empty()) return;

    const origR = parseFloat(circle.attr('r'));
    const enlargedR = origR * 1.3;

    // 主圆体放大1.3倍
    circle.transition().duration(300).attr('r', enlargedR);

    // 添加金色外圈（插入到node-circle之后，文字之前）
    nodeGroup.select('.highlight-ring').remove();
    const ring = nodeGroup.append('circle')
      .attr('class', 'highlight-ring')
      .attr('r', enlargedR + 5)
      .attr('fill', 'none')
      .attr('stroke', '#FFD700')
      .attr('stroke-width', 3)
      .attr('opacity', 1);

    // 金圈闪烁2次（4次状态切换 × 400ms）
    let flashCount = 0;
    const flashTimer = setInterval(() => {
      flashCount++;
      ring.attr('opacity', flashCount % 2 === 0 ? 1 : 0.15);
      if (flashCount >= 4) clearInterval(flashTimer);
    }, 400);

    // 3秒后恢复原始样式
    setTimeout(() => {
      circle.transition().duration(300).attr('r', origR);
      ring.transition().duration(300).attr('opacity', 0)
        .on('end', function() { d3.select(this).remove(); });
    }, 3000);
  });

  // 当前未选中节点时，自动切换右侧面板显示nodes[0]详情
  if (!selectedNode) {
    const firstNode = NODES_RAW.find(n => n.id === nodeIds[0]);
    if (firstNode) renderNodeDetail(firstNode);
  }
}

// 将AI回复追加到对话区（带打字机效果）
function appendAiMessage(text, speed, nodes) {

    '<div class="msg-avatar ai-avatar">AI</div>' +
    '<div class="msg-bubble msg-ai-bubble thinking-dots">' +
    '<span></span><span></span><span></span></div>';
  msgs.appendChild(thinkDiv);
  msgs.scrollTop = msgs.scrollHeight;

  // c. 延迟600-1200ms模拟思考，然后匹配并渲染回复
  const delay = 600 + Math.random() * 600;
  setTimeout(() => {
    thinkDiv.remove();

    const match = findBestMatch(text, window.knowledgeBase);
    if (!match || !match.record) {
      appendAiMessage('我暂时还不太理解这个问题 🤔\n你可以这样问我：\n• 「我还缺哪些技能？」\n• 「Shopify需要什么前置知识？」');
      return;
    }

    let responseText = match.record.response;
    // 中置信度时，在回复前加引导提示
    if (match.confidence === 'medium') {
      const labelMap = {
        path: '学习路径', prereq: '前置知识', detail: '节点详情',
        cert: '微证书', job: '就业岗位', order: '订单班',
        ability: '能力球', startup: '创业支持', greeting: '学习顾问'
      };
      const label = labelMap[match.record.intent] || '该问题';
      responseText = `我理解你在询问关于${label}的问题～\n\n` + responseText;
    }

    // d. 渲染AI回复（打字机效果），完成后高亮星图节点
    appendAiMessage(responseText, 18, match.record.nodes);
  }, delay);
}

// AI面板开关与首次欢迎消息
let welcomeShown = false;
document.getElementById('ai-fab').addEventListener('click', () => {
  document.getElementById('ai-panel').classList.add('open');
  // 面板首次打开时，用打字机渲染欢迎消息（speed=12更快）
  if (!welcomeShown) {
    welcomeShown = true;
    setTimeout(() => {
      appendAiMessage(
        '你好！我是你的AI学习顾问 ✨ 你可以问我任何关于学习路径、技能节点或就业方向的问题～',
        12
      );
    }, 350); // 等待面板滑入动画完成
  }
});
document.getElementById('ai-close').addEventListener('click', () => {
  document.getElementById('ai-panel').classList.remove('open');
});

// e. 发送按钮与Enter键触发
document.getElementById('ai-send').addEventListener('click', sendAiMsg);
document.getElementById('ai-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendAiMsg();
});

// ════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initStarMap();
  renderDefaultPanel();

  // 窗口resize
  window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-wrap');
    d3.select('#star-svg')
      .attr('width', container.clientWidth)
      .attr('height', container.clientHeight);
    if (simulation) {
      simulation.force('center', d3.forceCenter(container.clientWidth/2, container.clientHeight/2));
      simulation.alpha(0.3).restart();
    }
  });
});
</script>
